<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>AnimeFusion</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/script.js" defer></script>
</head>
<body>
    <!-- Header Section -->
    <header class="main-header">
        <div class="logo">
            <h1>AnimeFusion</h1>
        </div>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Browse</a></li>
                <li><a href="#">Genres</a></li>
                <li><a href="#">Blog</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h2>Discover Your Next Favorite Anime</h2>
            <p>Explore top-rated anime and dive into a world of adventure, drama, and fantasy!</p>
            <a href="#latest" class="cta-btn">Browse Now</a>
        </div>
    </section>

    <!-- Featured Anime Section -->
    <section id="latest" class="featured-anime">
        <h2>Featured Anime</h2>
        <div class="anime-container">
            <div class="anime-item">
                <img src="images/anime1.jpg" alt="Anime 1">
                <h3>Attack on Titan</h3>
            </div>
            <div class="anime-item">
                <img src="images/anime2.jpg" alt="Anime 2">
                <h3>Demon Slayer</h3>
            </div>
            <div class="anime-item">
                <img src="images/anime3.jpg" alt="Anime 3">
                <h3>My Hero Academia</h3>
            </div>
            <!-- Add more anime items here -->
        </div>
    </section>

    <!-- Footer Section -->
    <footer class="footer">
        <p>&copy; 2025 AnimeFusion. All rights reserved.</p>
    </footer>

</body>
</html>
