<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeHunter</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/script.js" defer></script>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header id="header">
            <div class="logo">
                <h1><a href="#">AnimeHunter</a></h1>
            </div>
            <nav id="main-nav">
                <ul>
                    <li><a href="#">Home</a></li>
                    <li><a href="#">Anime List</a></li>
                    <li><a href="#">News</a></li>
                    <li><a href="#">Contact</a></li>
                    <li><a href="#">About</a></li>
                </ul>
            </nav>
        </header>

        <!-- Hero Section -->
        <section id="hero">
            <div class="hero-content">
                <h2>Welcome to AnimeHunter</h2>
                <p>Find your favorite anime and discover new ones!</p>
                <a href="#latest-anime" class="cta-btn">Browse Latest Anime</a>
            </div>
        </section>

        <!-- Latest Anime Section -->
        <section id="latest-anime">
            <h2>Latest Releases</h2>
            <div class="anime-list">
                <div class="anime-item">
                    <img src="images/anime1.jpg" alt="Anime 1">
                    <div class="anime-details">
                        <h3>Attack on Titan</h3>
                        <p>Season 4</p>
                    </div>
                </div>
                <div class="anime-item">
                    <img src="images/anime2.jpg" alt="Anime 2">
                    <div class="anime-details">
                        <h3>Demon Slayer</h3>
                        <p>Season 2</p>
                    </div>
                </div>
                <!-- More anime items -->
            </div>
        </section>

        <!-- Footer -->
        <footer id="footer">
            <p>&copy; 2025 AnimeHunter. All Rights Reserved.</p>
        </footer>
    </div>
</body>
</html>
