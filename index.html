<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Streaming</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Anime Streaming</h1>
        <nav>
            <ul>
                <li><a href="#">მთავარი</a></li>
                <li><a href="#">კატეგორიები</a></li>
                <li><a href="#">სიახლეები</a></li>
                <li><a href="#">კონტაქტი</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <h2>გაიცანით თქვენი შემდეგი საყვარელი ანიმე</h2>
        <p>მოიძიეთ საუკეთესო ანიმე სერიები და დაიწყეთ ყურება დღესვე!</p>
        <a href="#" class="cta-btn">დაიწყეთ ახლა</a>
    </section>

    <section class="anime-list">
        <h2>პოპულარული ანიმე</h2>
        <div class="anime-item">
            <img src="anime1.jpg" alt="ანიმე 1">
            <h3>ანიმე 1</h3>
        </div>
        <div class="anime-item">
            <img src="anime2.jpg" alt="ანიმე 2">
            <h3>ანიმე 2</h3>
        </div>
        <div class="anime-item">
            <img src="anime3.jpg" alt="ანიმე 3">
            <h3>ანიმე 3</h3>
        </div>
    </section>

    <footer>
        <p>&copy; 2025 Anime Streaming. ყველა უფლება დაცულია.</p>
    </footer>

    <script src="scripts.js"></script>
</body>
</html>
